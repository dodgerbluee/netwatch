<section id="general-section" class="rounded-lg border border-slate-800 bg-slate-900/40 p-4 space-y-3">
  <h2 class="font-semibold">General</h2>
  <form method="post" action="/settings/config/general" class="space-y-2 text-sm">
    <label class="inline-flex items-center gap-2">
      <input type="checkbox" name="enforcement_enabled" value="on"
             {{ 'checked' if settings.enforcement_enabled else '' }} />
      <span>Enable auto-block enforcement</span>
    </label>
    <p class="text-xs text-slate-500">
      When off, netwatch monitors and alerts but never blocks devices at UniFi.
    </p>
    <button class="px-3 py-1.5 rounded-md border border-emerald-500/40 text-emerald-300 hover:bg-emerald-500/10 text-sm">
      Save
    </button>
  </form>
</section>
